services:
  # ─── Backend: Bloodchain Core ───────────────────────
  - type: web
    name: bloodchain-core
    env: node
    plan: free
    rootDir: bloodchain-core
    installCommand: npm install --legacy-peer-deps
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: bloodchain-db
          property: connectionString
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

  # ─── Frontend: Azure (Mobile) ───────────────────────
  - type: web
    name: bloodchain-azure
    env: static
    rootDir: azure
    installCommand: npm install --legacy-peer-deps
    buildCommand: npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://bloodchain-core.onrender.com/api/v1
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false

